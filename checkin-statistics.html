<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未打卡人员统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>未打卡人员统计</h1>
        
        <div class="card">
            <div class="card-header">
                上传Excel文件
            </div>
            <div class="card-body">
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="form-control mb-3">
                <div class="upload-buttons">
                    <button id="uploadBtn" class="btn btn-primary">上传并解析</button>
                </div>
            </div>
        </div>
        
        <div id="filterSection" class="filter-section" style="display: none;">
            <h5>筛选条件</h5>
            <div class="filter-row">
                <div class="filter-item">
                    <label>您所在的公司：</label>
                    <select id="companyFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>您所在的部门：</label>
                    <select id="departmentFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>打卡日期：</label>
                    <select id="dateFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <button id="compareBtn" class="btn btn-warning">对比人员名单</button>
                </div>
                <div class="filter-item">
                    <button id="managePersonsBtn" class="btn btn-primary">管理人员名单</button>
                </div>
            </div>
        </div>
        
        <!-- 人员对比结果区域 -->
        <div id="comparisonSection" class="card" style="display: none;">
            <div class="card-header">
                <div class="result-header">
                    <h6 id="resultTitle">人员对比结果</h6>
                    <div class="missing-count">未打卡人数：<span id="missingCount">0</span></div>
                </div>
                <!-- 导出按钮 -->
                <div class="export-buttons">
                    <button id="exportToPngBtn" class="btn btn-success btn-sm me-2">导出为图片</button>
                    <button id="exportToExcelBtn" class="btn btn-primary btn-sm">导出为Excel</button>
                </div>
            </div>
            <div class="card-body">
                <!-- 部门颜色说明 -->
                <div class="department-color-guide mb-4">
                    <h6>部门颜色说明：</h6>
                    <div class="color-indicators">
                        <span class="color-indicator admin">行政部</span>
                        <span class="color-indicator sales">销售部</span>
                        <span class="color-indicator medical">医疗部</span>
                    </div>
                </div>
                
                <!-- 未打卡人员名单 -->
                <div id="missingPersonsList" class="missing-persons-list"></div>
            </div>
        </div>
        
        <!-- 人员名单管理区域 -->
        <div id="personManagementSection" class="card" style="display: none;">
            <div class="card-header">
                人员名单管理
            </div>
            <div class="card-body">
                <div class="management-tabs">
                    <button class="tab-btn active" data-tab="add">添加人员</button>
                    <button class="tab-btn" data-tab="remove">删除人员</button>
                    <button class="tab-btn" data-tab="update">更新人员</button>
                    <button class="tab-btn" data-tab="view">查看名单</button>
                </div>
                
                <div class="tab-content">
                    <!-- 添加人员 -->
                    <div id="add-tab" class="tab-pane active">
                        <div class="input-group mb-3">
                            <input type="text" id="addName" class="form-control" placeholder="请输入人员姓名,格式为'张三+销售部',例如'李四+行政部',如果没有按严格的格式，默认添加到医疗部">
                            <button id="addPersonBtn" class="btn btn-success">添加</button>
                        </div>
                    </div>
                    
                    <!-- 删除人员 -->
                    <div id="remove-tab" class="tab-pane">
                        <div class="input-group mb-3">
                            <input type="text" id="removeName" class="form-control" placeholder="输入人员姓名">
                            <button id="removePersonBtn" class="btn btn-danger">删除</button>
                        </div>
                    </div>
                    
                    <!-- 更新人员 -->
                    <div id="update-tab" class="tab-pane">
                        <div class="mb-3">
                            <input type="text" id="oldName" class="form-control mb-2" placeholder="输入旧姓名">
                            <input type="text" id="newName" class="form-control mb-2" placeholder="输入新姓名">
                            <button id="updatePersonBtn" class="btn btn-warning">更新</button>
                        </div>
                    </div>
                    
                    <!-- 查看名单 -->
                    <div id="view-tab" class="tab-pane">
                        <div id="personListView" class="person-list-view"></div>
                        <p class="text-muted mt-2">总人数：<span id="personCount">0</span></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 返回导航页面 -->
        <div class="return-button" style="position: absolute; top: 20px; right: 20px;">
            <a href="index.html" class="btn btn-secondary btn-sm">返回导航页面</a>
        </div>
    </div>

    <script src="checkin-script.js"></script>
</body>
</html>
