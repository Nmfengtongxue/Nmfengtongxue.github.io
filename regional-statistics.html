<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区域宣发统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>区域宣发统计</h1>
        
        <div class="card">
            <div class="card-header">
                上传Excel文件
            </div>
            <div class="card-body">
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="form-control mb-3">
                <div class="upload-buttons">
                    <button id="uploadBtn" class="btn btn-primary">上传并解析</button>
                    <button id="autoFillBtn" class="btn btn-info" disabled>一键遍历填入</button>
                </div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="progress-text" id="progressText">准备开始...</div>
                </div>
            </div>
        </div>
        
        <div id="filterSection" class="filter-section" style="display: none;">
            <h5>筛选条件</h5>
            <div class="filter-row">
                <div class="filter-item">
                    <label>您所在的公司：</label>
                    <select id="companyFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>您所在的部门：</label>
                    <select id="departmentFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>打卡日期：</label>
                    <select id="dateFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="table-container">
            <table id="dataTable" class="table table-striped table-hover" style="display: none;">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div id="sumSection" class="alert alert-secondary" style="display: none;">
            <strong>合计:</strong>
            <span id="sumDisplay"></span>
        </div>

        <!-- 转发次数统计表单 -->
        <div class="forward-form-section">
            <div class="forward-controls">
                <h3>转发次数统计</h3>
                <div class="control-buttons">
                    <button id="sortBtn" class="btn btn-primary">按宣发总量降序排序</button>
                    <button id="exportExcelBtn" class="btn btn-success">导出Excel</button>
                    <button id="exportSvgBtn" class="btn btn-info">导出SVG</button>
                </div>
            </div>
            <div class="table-container">
                <table id="forwardTable" class="table table-bordered forward-table">
                    <!-- 表格内容将根据Excel数据动态生成 -->
                </table>
            </div>
        </div>

        <!-- 返回导航页面 -->
        <div class="return-button" style="position: absolute; top: 20px; right: 20px;">
            <a href="index.html" class="btn btn-secondary btn-sm">返回导航页面</a>
        </div>
    </div>

    <script src="regional-script.js"></script>
</body>
</html>
