<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>喜报生成工具</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="styles.css"><style>@font-face{font-family:'ChuangkitZongYi';src:local('SimHei'), local('黑体');font-weight:bold;}@font-face{font-family:'NotoSansSCBlack';src:local('SimHei'), local('黑体');font-weight:normal;}@font-face{font-family:'NotoSansSCMedium';src:local('SimHei'), local('黑体');font-weight:normal;}.upload-section{text-align:center;margin-bottom:20px;padding:15px;background-color:#f8f9fa;border-radius:8px;border:2px dashed #dee2e6;transition:all 0.3s ease;max-width:600px;margin-left:auto;margin-right:auto;}.upload-section:hover{border-color:var(--primary-color);background-color:rgba(59, 130, 246, 0.05);}#fileInput{display:block;margin:0 auto 15px;padding:10px 20px;font-size:14px;background-color:white;border:2px solid #dee2e6;border-radius:6px;cursor:pointer;transition:all 0.3s ease;max-width:300px;}#fileInput:hover{border-color:var(--primary-color);box-shadow:0 2px 8px rgba(59, 130, 246, 0.2);}.upload-section p{margin:0;color:#6c757d;font-size:14px;}.main-layout{display:grid;grid-template-columns:320px 1fr;gap:20px;margin-bottom:20px;}.controls-container{display:flex;flex-direction:column;background-color:#f8f9fa;border-radius:8px;padding:15px;height:800px;overflow-y:auto;box-sizing:border-box;min-width:0;max-height:1600px;}.canvas-container{display:flex;justify-content:flex-end;align-items:flex-start;padding:10px;background-color:#f8f9fa;border-radius:8px;position:relative;height:800px;overflow-y:auto;overflow-x:hidden;}#canvas{border:1px solid #dee2e6;border-radius:6px;box-shadow:0 2px 8px rgba(0, 0, 0, 0.05);width:540px !important;height:995px !important;}.text-editors{margin-bottom:20px;}.editor-section{background-color:white;border-radius:6px;padding:12px;margin-bottom:15px;box-shadow:0 1px 4px rgba(0, 0, 0, 0.06);border:1px solid #e9ecef;}.editor-section h3{margin-top:0;margin-bottom:12px;font-size:14px;color:var(--primary-color);font-weight:700;border-bottom:1px solid var(--primary-color);padding-bottom:8px;text-align:center;}.export-settings{background-color:white;border-radius:6px;padding:12px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0, 0, 0, 0.06);border:1px solid #e9ecef;}.export-settings h3{margin-top:0;margin-bottom:12px;font-size:14px;color:var(--primary-color);font-weight:700;border-bottom:1px solid var(--primary-color);padding-bottom:8px;text-align:center;}.control-group{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}.control-group label{display:block;font-size:12px;color:#6c757d;margin-bottom:3px;font-weight:500;}.control-group input,.control-group select{padding:8px 12px;font-size:14px;border:1px solid var(--border-color);border-radius:4px;width:100%;box-sizing:border-box;}.control-row{display:flex;gap:10px;margin-bottom:12px;}.control-row > .control-group{flex:1;margin-bottom:0;}.button-group{text-align:center;display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-top:20px;border-top:1px solid #dee2e6;}.controls-container h2{text-align:center;font-size:18px;color:var(--primary-color);margin-top:0;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--primary-color);}input[type="color"]{width:100%;height:40px;padding:2px;border:1px solid var(--border-color);border-radius:4px;}.controls-container::-webkit-scrollbar{width:6px;}.controls-container::-webkit-scrollbar-track{background:#f1f1f1;border-radius:3px;}.controls-container::-webkit-scrollbar-thumb{background:var(--primary-color);border-radius:3px;}.controls-container::-webkit-scrollbar-thumb:hover{background:#2563eb;}#deptContent, #nameContent, #congratsContent, #orderContent, #amountContent{font-weight:bold;font-size:14px;}select{cursor:pointer;background-color:white;}@media (max-width: 1024px){.main-layout{grid-template-columns:1fr;}.canvas-container{height:auto;}.controls-container{max-height:none;}}@media (max-width: 768px){.main-layout{gap:10px;}.canvas-container{padding:10px;}#canvas{max-width:100%;height:auto;}}</style><script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script></head><body><div class="container"><h1>喜报生成工具</h1><div class="return-button" style="position: absolute; top: 20px; right: 20px;"><a href="index.html" class="btn btn-secondary btn-sm">返回导航页面</a></div><div class="card mb-4"><div class="card-header">上传图片</div><div class="card-body"><div class="upload-section"><input type="file" id="fileInput" accept="image/jpeg,image/png"><p>请上传图片，系统将自动定位需要替换的文字区域</p></div></div></div><div class="main-layout"><div class="controls-container"><h2>文字编辑</h2><div class="text-editors"><div class="editor-section"><h3>1. 部门</h3><div class="control-group"><label for="deptContent">文字内容:</label><input type="text" id="deptContent" placeholder="请输入部门" value="销售部"><div style="margin-top: 8px;"><label for="deptPreset">预选部门:</label><select id="deptPreset" onchange="if(this.value){document.getElementById('deptContent').value=this.value; updateTextObject('dept'); this.value='';}"><option value="">请选择</option><option value="销售部">销售部</option><option value="行政部">行政部</option><option value="医疗中心">医疗中心</option><option value="总经理">总经理</option><option value="副总经理">副总经理</option></select></div></div><div class="control-row"><div class="control-group"><label for="deptFontFamily">字体:</label><select id="deptFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack" selected>黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="deptFontSize">字号:</label><input type="number" id="deptFontSize" value="48" min="12" max="200"></div><div class="control-group"><label for="deptFontColor">颜色:</label><input type="color" id="deptFontColor" value="#fff2eb"></div></div></div><div class="editor-section"><h3>2. 姓名</h3><div class="control-group"><label for="nameContent">文字内容:</label><input type="text" id="nameContent" placeholder="请输入姓名" oninput="updateCongratsText()"><div style="margin-top: 8px;"><label for="nameFilter">预选姓名:</label><select id="nameFilter" onchange="if(this.value){document.getElementById('nameContent').value=this.value; document.getElementById('deptContent').value=PERSONNEL_MAP[this.value]; updateTextObject('name'); updateTextObject('dept'); this.value='';}"><option value="">请选择</option></select><label for="deptFilter" style="margin-top: 8px;">按部门筛选:</label><select id="deptFilter" onchange="filterNamesByDepartment()"><option value="">全部部门</option><option value="销售部">销售部</option><option value="行政部">行政部</option><option value="医疗中心">医疗中心</option><option value="总经理">总经理</option><option value="副总经理">副总经理</option></select></div></div><div class="control-row"><div class="control-group"><label for="nameFontFamily">字体:</label><select id="nameFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack" selected>黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="nameFontSize">字号:</label><input type="number" id="nameFontSize" value="40" min="12" max="200"></div><div class="control-group"><label for="nameFontColor">颜色:</label><input type="color" id="nameFontColor" value="#fff2eb"></div></div></div><div class="editor-section"><h3>3. 恭喜</h3><div class="control-group"><label for="congratsContent">文字内容:</label><input type="text" id="congratsContent" placeholder="请输入恭喜内容" value="恭喜："></div><div class="control-row"><div class="control-group"><label for="congratsFontFamily">字体:</label><select id="congratsFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack">黑体</option><option value="NotoSansSCMedium" selected>中等黑体</option></select></div><div class="control-group"><label for="congratsFontSize">字号:</label><input type="number" id="congratsFontSize" value="42" min="12" max="200"></div><div class="control-group"><label for="congratsFontColor">颜色:</label><input type="color" id="congratsFontColor" value="#9f0913"></div></div></div><div class="editor-section"><h3>4. 下单</h3><div class="control-group"><label for="orderContent">文字内容:</label><input type="text" id="orderContent" placeholder="请输入下单内容" value="开门红套餐下单"></div><div class="control-row"><div class="control-group"><label for="orderFontFamily">字体:</label><select id="orderFontFamily"><option value="ChuangkitZongYi" selected>创意字体</option><option value="NotoSansSCBlack">黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="orderFontSize">字号:</label><input type="number" id="orderFontSize" value="48" min="12" max="200"></div><div class="control-group"><label for="orderFontColor">颜色:</label><input type="color" id="orderFontColor" value="#80090d"></div></div></div><div class="editor-section"><h3>5. 金额</h3><div class="control-group"><label for="amountContent">文字内容:</label><input type="text" id="amountContent" placeholder="请输入金额" value="15800元"></div><div class="control-row"><div class="control-group"><label for="amountFontFamily">字体:</label><select id="amountFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack" selected>黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="amountFontSize">字号:</label><input type="number" id="amountFontSize" value="170" min="12" max="200"></div><div class="control-group"><label for="amountFontColor">颜色:</label><input type="color" id="amountFontColor" value="#ffb875"></div></div></div></div><div class="export-settings"><h3>头像管理</h3><div class="control-group"><label for="avatarNameInput">姓名:</label><input type="text" id="avatarNameInput" placeholder="请输入姓名"><button id="previewAvatarBtn" class="btn btn-secondary btn-sm" style="margin-top: 8px;">预览头像</button></div><div class="control-group"><label>头像预览:</label><div id="avatarPreviewArea" style="width: 100%; height: 200px; border: 1px solid #dee2e6; border-radius: 4px; background-color: #f8f9fa; display: flex; align-items: center; justify-content: center;"><span style="color: #6c757d; font-size: 14px;">头像预览</span></div><button id="confirmAvatarBtn" class="btn btn-primary btn-sm" style="margin-top: 8px;" disabled>确认上传到画布</button></div><div class="control-group"><label for="avatarFileInput">上传图片:</label><input type="file" id="avatarFileInput" accept="image/jpeg,image/png"><label for="avatarReverseName" style="margin-top: 8px;">姓名:</label><input type="text" id="avatarReverseName" placeholder="请输入姓名"><label for="avatarReverseDept">部门:</label><select id="avatarReverseDept"><option value="销售部">销售部</option><option value="行政部">行政部</option><option value="医疗中心">医疗中心</option><option value="总经理">总经理</option><option value="副总经理">副总经理</option></select><button id="uploadImageWithNameBtn" class="btn btn-primary btn-sm" style="margin-top: 8px;">上传并保存</button></div><div class="control-group"><button id="deletePersonBtn" class="btn btn-danger btn-sm" style="margin-right: 8px;">删除人员</button><button id="viewAllPersonsBtn" class="btn btn-info btn-sm">查看所有人员</button><div id="avatarTip" style="margin-top: 8px; font-size: 12px; color: #6c757d;"></div></div></div><div class="export-settings"><h3>导出设置</h3><div class="control-row"><div class="control-group"><label for="exportWidth">宽度:</label><input type="number" id="exportWidth" value="1080" min="100"></div><div class="control-group"><label for="exportHeight">高度:</label><input type="number" id="exportHeight" value="1990" min="100"></div></div></div><div class="button-group"><button id="exportBtn" class="btn btn-primary">导出为JPG</button><button id="resetBtn" class="btn btn-secondary">重置画布</button></div></div><div class="card mb-4"><div class="card-header">预览效果</div><div class="card-body"><div class="canvas-container"><canvas id="canvas" width="1080" height="1990"></canvas></div></div></div></div></div><div id="personListModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);"><div style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 600px; border-radius: 8px;"><span style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;" class="close">&times;</span><h3>人员名单</h3><div id="personListContent"></div></div></div><script>const TEXT_AREAS={dept:{x:966,y:500,width:80,height:300},name:{x:898,y:505,width:80,height:200},congrats:{x:110,y:1272,width:880,height:150},order:{x:100,y:1400,width:880,height:100},amount:{x:100,y:1550,width:880,height:150}};const PERSONNEL_MAP={'范宏云':'副总经理','朱甦雅':'行政部','王斌斌':'行政部','杜永丽':'行政部','张巧花':'行政部','史正蓓':'销售部','陈炳森':'销售部','白金玉':'销售部','王莉莉':'销售部','董博':'销售部','王佳':'销售部','刘倩倩':'销售部','苏丹':'医疗中心','曹娟':'医疗中心','张改霞':'医疗中心','李雨婷':'医疗中心','赵改过':'医疗中心','张英玲':'医疗中心','胡立茹':'医疗中心','杨晓昭':'医疗中心','王烁楠':'医疗中心','朱丹':'医疗中心','朱英':'医疗中心','胡秀娥':'医疗中心','韩万忠':'医疗中心','郭锦霞':'医疗中心','程芸':'医疗中心','张文慧':'医疗中心','王倩倩':'医疗中心','孙悦':'医疗中心','郑晓燕':'医疗中心','魏霞':'医疗中心','姚建强':'医疗中心','潘雨萍':'医疗中心','朱艳丽':'医疗中心','董凯雨':'医疗中心','张鹤廷':'医疗中心','孙绿萍':'医疗中心','刘丹丹':'医疗中心','张丽娟':'医疗中心','邵倩':'医疗中心','王晓霞':'医疗中心','党江娟':'医疗中心','刘沛':'医疗中心','周娜':'医疗中心','姜媛媛':'医疗中心','苏巧燕':'医疗中心','杨文娟':'医疗中心'};let currentPreviewAvatar=null;let uploadedAvatars={};let canvas;let backgroundImage=null;let textObjects={};function loadFromLocalStorage(){const savedPersonnelMap=localStorage.getItem('personnelMap');if(savedPersonnelMap){Object.assign(PERSONNEL_MAP,JSON.parse(savedPersonnelMap));}const savedAvatars=localStorage.getItem('uploadedAvatars');if(savedAvatars){uploadedAvatars=JSON.parse(savedAvatars);}}function initCanvas(){canvas=new fabric.Canvas('canvas',{backgroundColor:'#ffffff',preserveObjectStacking:true});}function handleFileUpload(file){const reader=new FileReader();reader.onload=function(e){fabric.Image.fromURL(e.target.result,function(img){const maxSize=391;const scaleX=maxSize/img.width;const scaleY=maxSize/img.height;const scale=Math.min(scaleX,scaleY);img.scale(scale);const radius=maxSize/2;const canvasCenterX=canvas.width/2;img.set({left:canvasCenterX,top:790,originX:'center',originY:'center',clipTo:function(ctx){ctx.save();ctx.globalCompositeOperation='destination-in';ctx.arc(0,0,radius,0,Math.PI*2,false);ctx.fill();ctx.restore();},selectable:true,evented:true});const objects=canvas.getObjects();if(objects.length>0){canvas.clear();canvas.add(img);const topImageUrl='https://raw.githubusercontent.com/Nmfengtongxue/daily_imgs/main/7.png';fabric.Image.fromURL(topImageUrl,function(topImg){topImg.scaleToWidth(canvas.width);topImg.scaleToHeight(canvas.height);topImg.selectable=false;topImg.evented=false;canvas.add(topImg);addTextObjects();canvas.renderAll();console.log('圆形图片已添加完成，层级在顶层的下一层');}, {crossOrigin:'anonymous',onError:function(err){console.error('加载顶层图片失败:',err);}});setTimeout(function(){const currentName=document.getElementById('nameContent').value;const currentDept=document.getElementById('deptContent').value;document.getElementById('orderContent').value='开门红套餐下单';if(currentName){document.getElementById('nameContent').value=currentName;}if(currentDept){document.getElementById('deptContent').value=currentDept;}Object.keys(TEXT_AREAS).forEach(key=>{updateTextObject(key);});},100);}else{canvas.add(img);canvas.renderAll();}});};reader.readAsDataURL(file);}function addTextObjects(){Object.values(textObjects).forEach(obj=>canvas.remove(obj));textObjects={};textObjects.dept=new fabric.Text('',{left:TEXT_AREAS.dept.x+TEXT_AREAS.dept.width/2,top:TEXT_AREAS.dept.y,fontSize:48,fontFamily:'NotoSansSCBlack',fill:'#fff2eb',fontWeight:'bold',textAlign:'center',originX:'center',originY:'top',lineHeight:58/48});textObjects.name=new fabric.Text('',{left:TEXT_AREAS.name.x+TEXT_AREAS.name.width/2,top:TEXT_AREAS.name.y,fontSize:40,fontFamily:'NotoSansSCBlack',fill:'#fff2eb',fontWeight:'bold',textAlign:'center',originX:'center',originY:'top',lineHeight:50/40,shadow:new fabric.Shadow({color:'rgba(0,0,0,0.3)',blur:5,offsetX:2,offsetY:2})});textObjects.congrats=new fabric.Text('',{left:TEXT_AREAS.congrats.x,top:TEXT_AREAS.congrats.y,fontSize:42,fontFamily:'NotoSansSCMedium',fill:'#9f0913',fontWeight:'bold',textAlign:'left',originX:'left',originY:'top',shadow:new fabric.Shadow({color:'rgba(0,0,0,0.3)',blur:8,offsetX:3,offsetY:3})});textObjects.order=new fabric.Text('',{left:TEXT_AREAS.order.x+TEXT_AREAS.order.width/2,top:TEXT_AREAS.order.y,fontSize:48,fontFamily:'ChuangkitZongYi',fill:'#80090d',fontWeight:'bold',textAlign:'center',originX:'center',originY:'middle',shadow:new fabric.Shadow({color:'rgba(0,0,0,0.3)',blur:5,offsetX:2,offsetY:2})});textObjects.amount=new fabric.Text('',{left:TEXT_AREAS.amount.x+TEXT_AREAS.amount.width/2,top:TEXT_AREAS.amount.y,fontSize:170,fontFamily:'NotoSansSCBlack',fill:'#ffb875',fontWeight:'bold',textAlign:'center',originX:'center',originY:'middle',shadow:new fabric.Shadow({color:'rgba(0,0,0,0.4)',blur:10,offsetX:4,offsetY:4})});Object.values(textObjects).forEach(obj=>canvas.add(obj));}function updateTextObject(key){if(!textObjects[key])return;let content=document.getElementById(`${key}Content`).value;const fontFamily=document.getElementById(`${key}FontFamily`).value;const fontSize=parseInt(document.getElementById(`${key}FontSize`).value);const fontColor=document.getElementById(`${key}FontColor`).value;if(key==='dept'||key==='name'){content=content.split('').join('

ateCoordinateDisplay(obj){let coordDisplay=document.getElementById('coordinateDisplay');if(!coordDisplay){coordDisplay=document.createElement('div');coordDisplay.id='coordinateDisplay';coordDisplay.style.position='fixed';coordDisplay.style.bottom='10px';coordDisplay.style.left='10px';coordDisplay.style.backgroundColor='rgba(0, 0, 0, 0.7)';coordDisplay.style.color='white';coordDisplay.style.padding='8px 12px';coordDisplay.style.borderRadius='4px';coordDisplay.style.fontSize='12px';coordDisplay.style.zIndex='1000';document.body.appendChild(coordDisplay);}coordDisplay.textContent=`X: ${Math.round(obj.left)}, Y: ${Math.round(obj.top)}`;}function initEventListeners(){document.getElementById('fileInput').addEventListener('change',function(e){const file=e.target.files[0];if(file){handleFileUpload(file);}});document.getElementById('exportBtn').addEventListener('click',exportToJPG);document.getElementById('resetBtn').addEventListener('click',resetCanvas);Object.keys(TEXT_AREAS).forEach(key=>{document.getElementById(`${key}Content`).addEventListener('input',()=>updateTextObject(key));document.getElementById(`${key}FontFamily`).addEventListener('change',()=>updateTextObject(key));document.getElementById(`${key}FontSize`).addEventListener('input',()=>updateTextObject(key));document.getElementById(`${key}FontColor`).addEventListener('input',()=>updateTextObject(key));});document.addEventListener('keydown',handleKeydown);canvas.on('selection:created',function(e){updateCoordinateDisplay(e.selected[0]);});canvas.on('object:moving',function(e){updateCoordinateDisplay(e.target);});initNameDropdown();document.getElementById('previewAvatarBtn').addEventListener('click',previewAvatar);document.getElementById('confirmAvatarBtn').addEventListener('click',uploadAvatarToCanvas);document.getElementById('uploadImageWithNameBtn').addEventListener('click',uploadImageWithName);document.getElementById('deletePersonBtn').addEventListener('click',deletePerson);document.getElementById('viewAllPerson
