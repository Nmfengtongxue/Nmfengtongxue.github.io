<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>喜报生成工具</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="styles.css"><style>
        /* 加载网络字体（使用备用方案） */
        @font-face {
            font-family: 'ChuangkitZongYi';
            src: local('SimHei'), local('黑体');
            font-weight: bold;
        }
        @font-face {
            font-family: 'NotoSansSCBlack';
            src: local('SimHei'), local('黑体');
            font-weight: normal;
        }
        @font-face {
            font-family: 'NotoSansSCMedium';
            src: local('SimHei'), local('黑体');
            font-weight: normal;
        }
        /* 上传区域 */
        .upload-section {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
            transition: all 0.3s ease;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .upload-section:hover {
            border-color: var(--primary-color);
            background-color: rgba(59, 130, 246, 0.05);
        }
        #fileInput {
            display: block;
            margin: 0 auto 15px;
            padding: 10px 20px;
            font-size: 14px;
            background-color: white;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            max-width: 300px;
        }
        #fileInput:hover {
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
        }
        .upload-section p {
            margin: 0;
            color: #6c757d;
            font-size: 14px;
        }
        /* 主布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        /* 控制面板容器 */
        .controls-container {
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            height: 800px;
            overflow-y: auto;
            box-sizing: border-box;
            min-width: 0;
            max-height: 1600px;
        }
        /* 画布容器 */
        .canvas-container {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 8px;
            position: relative;
            height: 800px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        /* 画布样式 */
        #canvas {
            border: 1px solid #dee2e6;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            /* 确保画布按1080:1990的比例显示，不缩放 */
            width: 540px !important;
            height: 995px !important;
        }
        /* 文字编辑器容器 */
        .text-editors {
            margin-bottom: 20px;
        }
        /* 编辑器区块 */
        .editor-section {
            background-color: white;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            border: 1px solid #e9ecef;
        }
        .editor-section h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--primary-color);
            font-weight: 700;
            border-bottom: 1px solid var(--primary-color);
            padding-bottom: 8px;
            text-align: center;
        }
        /* 导出设置 */
        .export-settings {
            background-color: white;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            border: 1px solid #e9ecef;
        }
        .export-settings h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--primary-color);
            font-weight: 700;
            border-bottom: 1px solid var(--primary-color);
            padding-bottom: 8px;
            text-align: center;
        }
        /* 控制组布局 */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .control-group label {
            display: block;
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 3px;
            font-weight: 500;
        }
        .control-group input,
        .control-group select {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        /* 控制行 */
        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .control-row > .control-group {
            flex: 1;
            margin-bottom: 0;
        }
        /* 按钮组 */
        .button-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto; /* 推到底部 */
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
        }
        /* 控制面板标题 */
        .controls-container h2 {
            text-align: center;
            font-size: 18px;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }
        /* 颜色选择器 */
        input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 2px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        /* 优化滚动条样式 */
        .controls-container::-webkit-scrollbar {
            width: 6px;
        }
        .controls-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .controls-container::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 3px;
        }
        .controls-container::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
        /* 优化文字内容输入框 */
        #deptContent, #nameContent, #congratsContent, #orderContent, #amountContent {
            font-weight: bold;
            font-size: 14px;
        }
        /* 优化选择框样式 */
        select {
            cursor: pointer;
            background-color: white;
        }
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            .canvas-container {
                height: auto;
            }
            .controls-container {
                max-height: none;
            }
        }
        @media (max-width: 768px) {
            .main-layout {
                gap: 10px;
            }
            .canvas-container {
                padding: 10px;
            }
            #canvas {
                max-width: 100%;
                height: auto;
            }
        }
    </style><script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script></head><body><div class="container"><h1>喜报生成工具</h1><div class="return-button" style="position: absolute; top: 20px; right: 20px;"><a href="index.html" class="btn btn-secondary btn-sm">返回导航页面</a></div><div class="card mb-4"><div class="card-header">
                上传图片
            </div><div class="card-body"><div class="upload-section"><input type="file" id="fileInput" accept="image/jpeg,image/png"><p>请上传图片，系统将自动定位需要替换的文字区域</p></div></div></div><div class="main-layout"><div class="controls-container"><h2>文字编辑</h2><div class="text-editors"><div class="editor-section"><h3>1. 部门</h3><div class="control-group"><label for="deptContent">文字内容:</label><input type="text" id="deptContent" placeholder="请输入部门" value="销售部"><div style="margin-top: 8px;"><label for="deptPreset">预选部门:</label><select id="deptPreset" onchange="if(this.value){document.getElementById('deptContent').value=this.value; updateTextObject('dept'); this.value='';}"><option value="">请选择</option><option value="销售部">销售部</option><option value="行政部">行政部</option><option value="医疗中心">医疗中心</option><option value="总经理">总经理</option><option value="副总经理">副总经理</option></select></div></div><div class="control-row"><div class="control-group"><label for="deptFontFamily">字体:</label><select id="deptFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack" selected>黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="deptFontSize">字号:</label><input type="number" id="deptFontSize" value="48" min="12" max="200"></div><div class="control-group"><label for="deptFontColor">颜色:</label><input type="color" id="deptFontColor" value="#fff2eb"></div></div></div><div class="editor-section"><h3>2. 姓名</h3><div class="control-group"><label for="nameContent">文字内容:</label><input type="text" id="nameContent" placeholder="请输入姓名" oninput="updateCongratsText()"></div><div class="control-row"><div class="control-group"><label for="nameFontFamily">字体:</label><select id="nameFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack" selected>黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="nameFontSize">字号:</label><input type="number" id="nameFontSize" value="40" min="12" max="200"></div><div class="control-group"><label for="nameFontColor">颜色:</label><input type="color" id="nameFontColor" value="#fff2eb"></div></div></div><div class="editor-section"><h3>3. 恭喜</h3><div class="control-group"><label for="congratsContent">文字内容:</label><input type="text" id="congratsContent" placeholder="请输入恭喜语"></div><div class="control-row"><div class="control-group"><label for="congratsFontFamily">字体:</label><select id="congratsFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack">黑体</option><option value="NotoSansSCMedium" selected>中等黑体</option></select></div><div class="control-group"><label for="congratsFontSize">字号:</label><input type="number" id="congratsFontSize" value="42" min="12" max="300"></div><div class="control-group"><label for="congratsFontColor">颜色:</label><input type="color" id="congratsFontColor" value="#9f0913"></div></div></div><div class="editor-section"><h3>4. 下单</h3><div class="control-group"><label for="orderContent">文字内容:</label><input type="text" id="orderContent" placeholder="请输入下单信息" value="开门红套餐下单"></div><div class="control-row"><div class="control-group"><label for="orderFontFamily">字体:</label><select id="orderFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack" selected>黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="orderFontSize">字号:</label><input type="number" id="orderFontSize" value="48" min="12" max="200"></div><div class="control-group"><label for="orderFontColor">颜色:</label><input type="color" id="orderFontColor" value="#80090d"></div></div></div><div class="editor-section"><h3>5. 金额</h3><div class="control-group"><label for="amountContent">文字内容:</label><input type="text" id="amountContent" placeholder="请输入金额"></div><div class="control-row"><div class="control-group"><label for="amountFontFamily">字体:</label><select id="amountFontFamily"><option value="ChuangkitZongYi">创意字体</option><option value="NotoSansSCBlack" selected>黑体</option><option value="NotoSansSCMedium">中等黑体</option></select></div><div class="control-group"><label for="amountFontSize">字号:</label><input type="number" id="amountFontSize" value="170" min="12" max="300"></div><div class="control-group"><label for="amountFontColor">颜色:</label><input type="color" id="amountFontColor" value="#ffb875"></div></div></div></div><div class="export-settings"><h3>导出设置</h3><div class="control-row"><div class="control-group"><label for="exportWidth">宽度:</label><input type="number" id="exportWidth" value="1080" min="100" max="4000"></div><div class="control-group"><label for="exportHeight">高度:</label><input type="number" id="exportHeight" value="1990" min="100" max="4000"></div></div></div><div class="button-group"><button id="exportBtn" class="btn btn-primary">导出JPG</button><button id="resetBtn" class="btn btn-danger">重置</button></div></div><div class="card"><div class="card-header">
                    预览效果
                </div><div class="card-body"><div class="canvas-container"><canvas id="canvas" width="1080" height="1990"></canvas></div></div></div></div></div><script>
        // 文字区域坐标定义
        const TEXT_AREAS = {
            dept: { x: 966, y: 500, width: 80, height: 300 }, // 部门：竖排文字
            name: { x: 898, y: 505, width: 80, height: 200 }, // 姓名：竖排文字，定位点110*1272
            congrats: { x: 110, y: 1272, width: 880, height: 150 }, // 恭喜：定位点110*1272
            order: { x: 100, y: 1400, width: 880, height: 100 }, // 下单：垂直居中，y坐标1400px
            amount: { x: 100, y: 1550, width: 880, height: 150 } // 金额：垂直居中，y坐标1550px
        };
        // 全局变量
        let canvas; // Fabric.js画布实例
        let backgroundImage = null; // 背景图片对象
        let textObjects = {}; // 文字对象集合
        /**
         * 初始化Fabric.js画布
         */
        function initCanvas() {
            canvas = new fabric.Canvas('canvas', {
                backgroundColor: '#ffffff',
                preserveObjectStacking: true
            });
        }
        /**
         * 处理文件上传
         * @param {File} file - 上传的图片文件
         */
        function handleFileUpload(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // 加载图片到画布
                fabric.Image.fromURL(e.target.result, function(img) {
                    // 调整图片大小为391px*391px
                    img.scaleToWidth(391);
                    img.scaleToHeight(391);
                    // 创建圆形裁剪区域
                    const radius = 391 / 2;
                    // 设置图片位置：画布中央，y坐标790px
                    const canvasCenterX = canvas.width / 2;
                    img.set({
                        left: canvasCenterX,
                        top: 790,
                        originX: 'center',
                        originY: 'center',
                        clipTo: function(ctx) {
                            ctx.arc(0, 0, radius, 0, Math.PI * 2, false);
                        },
                        selectable: true, // 允许拖拽移动
                        evented: true
                    });
                    // 移除之前可能存在的圆形图片
                    const objects = canvas.getObjects();
                    for (let i = objects.length - 1; i >= 0; i--) {
                        if (objects[i].clipTo) {
                            canvas.remove(objects[i]);
                        }
                    }
                    // 添加圆形图片到画布
                    // 确保图片在顶层的下一层
                    if (objects.length > 0) {
                        // 移除所有对象
                        canvas.clear();
                        // 重新添加背景图片（6.jpg）
                        canvas.add(backgroundImage);
                        // 添加上传的圆形图片
                        canvas.add(img);
                        // 重新添加顶层图片（7.png）
                        const topImageUrl = 'https://raw.githubusercontent.com/Nmfengtongxue/daily_imgs/main/7.png';
                        fabric.Image.fromURL(topImageUrl, function(topImg) {
                            // 调整图片大小以适应画布
                            topImg.scaleToWidth(canvas.width);
                            topImg.scaleToHeight(canvas.height);
                            // 设置图片不可拖拽移动
                            topImg.selectable = false;
                            topImg.evented = false;
                            // 添加顶层图片
                            canvas.add(topImg);
                            // 重新添加文字对象
                            addTextObjects();
                            // 渲染画布
                            canvas.renderAll();
                            console.log('圆形图片已添加完成，层级在顶层的下一层');
                        }, {
                            crossOrigin: 'anonymous', // 解决画布污染问题
                            onError: function(err) {
                                console.error('加载顶层图片失败:', err);
                            }
                        });
                    } else {
                        canvas.add(img);
                        canvas.renderAll();
                    }
                });
            };
            reader.readAsDataURL(file);
        }
        /**
         * 添加所有文字对象到画布
         */
        function addTextObjects() {
            // 清除现有文字对象
            Object.values(textObjects).forEach(obj => canvas.remove(obj));
            textObjects = {};
            // 创建部门文字 - 竖排（从上到下）
            textObjects.dept = new fabric.Text('', {
                left: TEXT_AREAS.dept.x + TEXT_AREAS.dept.width / 2,
                top: TEXT_AREAS.dept.y,
                fontSize: 48,
                fontFamily: 'NotoSansSCBlack',
                fill: '#fff2eb',
                fontWeight: 'bold',
                textAlign: 'center',
                originX: 'center',
                originY: 'top',
                lineHeight: 58/48 // 字间距10px
            });
            // 创建姓名文字 - 竖排（从上到下）
            textObjects.name = new fabric.Text('', {
                left: TEXT_AREAS.name.x + TEXT_AREAS.name.width / 2,
                top: TEXT_AREAS.name.y,
                fontSize: 40,
                fontFamily: 'NotoSansSCBlack',
                fill: '#fff2eb',
                fontWeight: 'bold',
                textAlign: 'center',
                originX: 'center',
                originY: 'top',
                lineHeight: 50/40, // 字间距10px
                shadow: new fabric.Shadow({
                    color: 'rgba(0,0,0,0.3)',
                    blur: 5,
                    offsetX: 2,
                    offsetY: 2
                })
            });
            // 创建恭喜文字
            textObjects.congrats = new fabric.Text('', {
                left: TEXT_AREAS.congrats.x,
                top: TEXT_AREAS.congrats.y,
                fontSize: 42,
                fontFamily: 'NotoSansSCMedium',
                fill: '#9f0913', // 默认颜色#9f0913
                fontWeight: 'bold',
                textAlign: 'left',
                originX: 'left',
                originY: 'top',
                shadow: new fabric.Shadow({
                    color: 'rgba(0,0,0,0.3)',
                    blur: 8,
                    offsetX: 3,
                    offsetY: 3
                })
            });
            // 创建下单文字 - 垂直居中
            textObjects.order = new fabric.Text('', {
                left: TEXT_AREAS.order.x + TEXT_AREAS.order.width / 2,
                top: TEXT_AREAS.order.y,
                fontSize: 48,
                fontFamily: 'ChuangkitZongYi',
                fill: '#80090d', // 默认颜色#80090d
                fontWeight: 'bold',
                textAlign: 'center',
                originX: 'center',
                originY: 'middle', // 垂直居中对齐
                shadow: new fabric.Shadow({
                    color: 'rgba(0,0,0,0.3)',
                    blur: 5,
                    offsetX: 2,
                    offsetY: 2
                })
            });
            // 创建金额文字 - 垂直居中
            textObjects.amount = new fabric.Text('', {
                left: TEXT_AREAS.amount.x + TEXT_AREAS.amount.width / 2,
                top: TEXT_AREAS.amount.y,
                fontSize: 170,
                fontFamily: 'NotoSansSCBlack',
                fill: '#ffb875', // 默认颜色#ffb875
                fontWeight: 'bold',
                textAlign: 'center',
                originX: 'center',
                originY: 'middle', // 垂直居中对齐
                shadow: new fabric.Shadow({
                    color: 'rgba(0,0,0,0.4)',
                    blur: 10,
                    offsetX: 4,
                    offsetY: 4
                })
            });
            // 添加所有文字对象到画布
            Object.values(textObjects).forEach(obj => canvas.add(obj));
        }
        /**
         * 更新指定的文字对象
         * @param {string} key - 文字对象的键名
         */
        function updateTextObject(key) {
            if (!textObjects[key]) return;
            // 获取输入值
            let content = document.getElementById(`${key}Content`).value;
            const fontFamily = document.getElementById(`${key}FontFamily`).value;
            const fontSize = parseInt(document.getElementById(`${key}FontSize`).value);
            const fontColor = document.getElementById(`${key}FontColor`).value;
            if (key === 'dept' || key === 'name') {
                // 部门和姓名文字特殊处理 - 竖排从上到下
                // 通过在每个字符之间添加换行符实现竖排
                content = content.split('').join('\n');
                // 计算行高，实现10px字间距
                const lineHeight = (fontSize + 10) / fontSize;
                textObjects[key].set({
                    text: content,
                    fontFamily: fontFamily,
                    fontSize: fontSize,
                    fill: fontColor,
                    textAlign: 'center',
                    lineHeight: lineHeight // 字间距10px
                });
            } else {
                // 其他文字正常处理
                textObjects[key].set({
                    text: content,
                    fontFamily: fontFamily,
                    fontSize: fontSize,
                    fill: fontColor
                });
            }
            canvas.renderAll();
        }
        /**
         * 导出为JPG图片
         */
        function exportToJPG() {
            if (!backgroundImage) {
                alert('请先上传图片');
                return;
            }
            // 获取导出尺寸
            const exportWidth = parseInt(document.getElementById('exportWidth').value);
            const exportHeight = parseInt(document.getElementById('exportHeight').value);
            // 创建临时画布用于导出
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = exportWidth;
            tempCanvas.height = exportHeight;
            const tempCtx = tempCanvas.getContext('2d');
            // 绘制背景图片
            tempCtx.drawImage(canvas.lowerCanvasEl, 0, 0, exportWidth, exportHeight);
            // 将Canvas转换为图片并下载
            tempCanvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'result.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.9);
        }
        /**
         * 重置画布
         * 功能：清空画布，重置背景图片和文字对象，清空输入框
         */
        function resetCanvas() {
            canvas.clear();
            backgroundImage = null;
            textObjects = {};
            // 清空输入框
            Object.keys(TEXT_AREAS).forEach(key => {
                document.getElementById(`${key}Content`).value = '';
            });
        }
        /**
         * 更新恭喜文字
         * 当姓名输入框内容变化时自动调用
         */
        function updateCongratsText() {
            const name = document.getElementById('nameContent').value;
            const congratsInput = document.getElementById('congratsContent');
            if (name) {
                congratsInput.value = `恭喜：${name}`;
                updateTextObject('congrats');
            } else {
                congratsInput.value = '';
                updateTextObject('congrats');
            }
        }
        /**
         * 处理键盘事件，实现文字对象的方向键微调
         * @param {KeyboardEvent} e - 键盘事件对象
         */
        function handleKeydown(e) {
            // 检查是否有选中的对象
            const activeObject = canvas.getActiveObject();
            if (!activeObject) return;
            // 检查是否是文字对象
            if (activeObject.type !== 'i-text' && activeObject.type !== 'text') return;
            // 定义微调步长
            const step = 5;
            // 阻止默认行为，防止页面滚动
            e.preventDefault();
            // 根据按下的方向键调整文字位置
            switch (e.key) {
                case 'ArrowUp':
                    activeObject.set('top', activeObject.top - step);
                    break;
                case 'ArrowDown':
                    activeObject.set('top', activeObject.top + step);
                    break;
                case 'ArrowLeft':
                    activeObject.set('left', activeObject.left - step);
                    break;
                case 'ArrowRight':
                    activeObject.set('left', activeObject.left + step);
                    break;
                default:
                    return;
            }
            // 重新渲染画布
            canvas.renderAll();
            // 更新坐标显示
            updateCoordinateDisplay(activeObject);
        }
        /**
         * 更新坐标显示
         * @param {Object} obj - 选中的对象
         */
        function updateCoordinateDisplay(obj) {
            // 创建或更新坐标显示元素
            let coordDisplay = document.getElementById('coordinateDisplay');
            if (!coordDisplay) {
                coordDisplay = document.createElement('div');
                coordDisplay.id = 'coordinateDisplay';
                coordDisplay.style.position = 'fixed';
                coordDisplay.style.bottom = '10px';
                coordDisplay.style.left = '10px';
                coordDisplay.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
                coordDisplay.style.color = 'white';
                coordDisplay.style.padding = '8px 12px';
                coordDisplay.style.borderRadius = '4px';
                coordDisplay.style.fontSize = '12px';
                coordDisplay.style.zIndex = '1000';
                document.body.appendChild(coordDisplay);
            }
            // 更新坐标信息
            coordDisplay.textContent = `X: ${Math.round(obj.left)}, Y: ${Math.round(obj.top)}`;
        }
        /**
         * 初始化事件监听
         */
        function initEventListeners() {
            // 文件上传事件
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    handleFileUpload(file);
                }
            });
            // 按钮事件
            document.getElementById('exportBtn').addEventListener('click', exportToJPG);
            document.getElementById('resetBtn').addEventListener('click', resetCanvas);
            // 实时更新各个文字对象
            Object.keys(TEXT_AREAS).forEach(key => {
                document.getElementById(`${key}Content`).addEventListener('input', () => updateTextObject(key));
                document.getElementById(`${key}FontFamily`).addEventListener('change', () => updateTextObject(key));
                document.getElementById(`${key}FontSize`).addEventListener('input', () => updateTextObject(key));
                document.getElementById(`${key}FontColor`).addEventListener('input', () => updateTextObject(key));
            });
            // 键盘事件监听，实现方向键微调
            document.addEventListener('keydown', handleKeydown);
            // 画布对象选择事件，更新坐标显示
            canvas.on('selection:created', function(e) {
                updateCoordinateDisplay(e.selected[0]);
            });
            // 画布对象移动事件，更新坐标显示
            canvas.on('object:moving', function(e) {
                updateCoordinateDisplay(e.target);
            });
        }
        /**
         * 页面加载完成后初始化
         */
        window.addEventListener('DOMContentLoaded', function() {
            initCanvas();
            initEventListeners();
            console.log('开始加载字体...');
            // 等待字体加载完成后再加载图片
            setTimeout(function() {
                console.log('字体加载完成，开始加载图片...');
                // 预加载6.jpg作为背景（底层）
                const bgImageUrl = 'https://raw.githubusercontent.com/Nmfengtongxue/daily_imgs/main/6.jpg';
                fabric.Image.fromURL(bgImageUrl, function(bgImg) {
                    // 保存背景图片对象
                    backgroundImage = bgImg;
                    // 调整图片大小以适应画布
                    bgImg.scaleToWidth(canvas.width);
                    bgImg.scaleToHeight(canvas.height);
                    // 设置图片不可拖拽移动
                    bgImg.selectable = false;
                    bgImg.evented = false;
                    // 清除画布并添加背景图片
                    canvas.clear();
                    canvas.add(bgImg);
                    // 预加载7.png作为顶层图片
                    const topImageUrl = 'https://raw.githubusercontent.com/Nmfengtongxue/daily_imgs/main/7.png';
                    fabric.Image.fromURL(topImageUrl, function(topImg) {
                        // 调整图片大小以适应画布
                        topImg.scaleToWidth(canvas.width);
                        topImg.scaleToHeight(canvas.height);
                        // 设置图片不可拖拽移动
                        topImg.selectable = false;
                        topImg.evented = false;
                        // 添加顶层图片
                        canvas.add(topImg);
                        // 添加初始文字对象
                        addTextObjects();
                        // 设置默认值
                        document.getElementById('deptContent').value = '销售部';
                        document.getElementById('orderContent').value = '开门红套餐下单';
                        updateTextObject('dept');
                        updateTextObject('order');
                        // 渲染画布
                        canvas.renderAll();
                        console.log('两个默认图片已加载完成');
                    }, {
                        crossOrigin: 'anonymous',
                        onError: function(err) {
                            console.error('加载顶层图片失败:', err);
                        }
                    });
                }, {
                    crossOrigin: 'anonymous', // 解决画布污染问题
                    onError: function(err) {
                        console.error('加载背景图片失败:', err);
                    }
                });
            }, 1000); // 延迟1秒，确保字体有足够时间加载
            console.log('PPT图片文字替换工具已加载完成');
        });
    </script></body></html>
