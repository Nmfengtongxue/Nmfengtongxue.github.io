<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel文件筛选工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Excel文件筛选工具</h1>
        
        <div class="card">
            <div class="card-header">
                上传Excel文件
            </div>
            <div class="card-body">
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="form-control mb-3">
                <div class="upload-buttons">
                    <button id="uploadBtn" class="btn btn-primary">上传并解析</button>
                    <button id="autoFillBtn" class="btn btn-info" disabled>一键遍历填入</button>
                </div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="progress-text" id="progressText">准备开始...</div>
                </div>
            </div>
        </div>
        
        <div id="filterSection" class="filter-section" style="display: none;">
            <h5>筛选条件</h5>
            <div class="filter-row">
                <div class="filter-item">
                    <label>您所在的公司：</label>
                    <select id="companyFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>您所在的部门：</label>
                    <select id="departmentFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>打卡日期：</label>
                    <select id="dateFilter" class="form-select">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item">
                    <button id="compareBtn" class="btn btn-warning">对比人员名单</button>
                </div>
                <div class="filter-item">
                    <button id="managePersonsBtn" class="btn btn-primary">管理人员名单</button>
                </div>
            </div>
        </div>
        
        <!-- 人员对比结果区域 -->
        <div id="comparisonSection" class="card" style="display: none;">
            <div class="card-header">
                人员对比结果
            </div>
            <div class="card-body">
                <h6>未打卡人员名单：</h6>
                <div id="missingPersonsList" class="missing-persons-list"></div>
                <div class="comparison-stats">
                    <p>应到人数：<span id="totalPersons">0</span></p>
                    <p>已到人数：<span id="presentPersons">0</span></p>
                    <p>未到人数：<span id="missingPersons">0</span></p>
                </div>
            </div>
        </div>
        
        <!-- 人员名单管理区域 -->
        <div id="personManagementSection" class="card" style="display: none;">
            <div class="card-header">
                人员名单管理
            </div>
            <div class="card-body">
                <div class="management-tabs">
                    <button class="tab-btn active" data-tab="add">添加人员</button>
                    <button class="tab-btn" data-tab="remove">删除人员</button>
                    <button class="tab-btn" data-tab="update">更新人员</button>
                    <button class="tab-btn" data-tab="view">查看名单</button>
                </div>
                
                <div class="tab-content">
                    <!-- 添加人员 -->
                    <div id="add-tab" class="tab-pane active">
                        <div class="input-group mb-3">
                            <input type="text" id="addName" class="form-control" placeholder="输入人员姓名">
                            <button id="addPersonBtn" class="btn btn-success">添加</button>
                        </div>
                    </div>
                    
                    <!-- 删除人员 -->
                    <div id="remove-tab" class="tab-pane">
                        <div class="input-group mb-3">
                            <input type="text" id="removeName" class="form-control" placeholder="输入人员姓名">
                            <button id="removePersonBtn" class="btn btn-danger">删除</button>
                        </div>
                    </div>
                    
                    <!-- 更新人员 -->
                    <div id="update-tab" class="tab-pane">
                        <div class="mb-3">
                            <input type="text" id="oldName" class="form-control mb-2" placeholder="输入旧姓名">
                            <input type="text" id="newName" class="form-control mb-2" placeholder="输入新姓名">
                            <button id="updatePersonBtn" class="btn btn-warning">更新</button>
                        </div>
                    </div>
                    
                    <!-- 查看名单 -->
                    <div id="view-tab" class="tab-pane">
                        <div id="personListView" class="person-list-view"></div>
                        <p class="text-muted mt-2">总人数：<span id="personCount">0</span></p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="table-container">
            <table id="dataTable" class="table table-striped table-hover" style="display: none;">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div id="sumSection" class="alert alert-secondary" style="display: none;">
            <strong>合计:</strong>
            <span id="sumDisplay"></span>
        </div>

        <!-- 转发次数统计表单 -->
        <div class="forward-form-section">
            <div class="forward-controls">
                <h3>转发次数统计</h3>
                <div class="control-buttons">
                    <button id="sortBtn" class="btn btn-primary">按宣发总量降序排序</button>
                    <button id="exportExcelBtn" class="btn btn-success">导出Excel</button>
                    <button id="exportSvgBtn" class="btn btn-info">导出SVG</button>
                </div>
            </div>
            <div class="table-container">
                <table id="forwardTable" class="table table-bordered forward-table">
                    <!-- 表格内容将根据Excel数据动态生成 -->
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
